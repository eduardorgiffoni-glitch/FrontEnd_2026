<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 380px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #f7f7f7;
            font-size: 17px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Infinity Bank</h1>

        <div class="campo">
            <label>Bandeira do Cartão</label>

            <select id="bandeira">
                <option value="visa">Visa</option>
                <option value="master">Master</option>
                <option value="elo">Elo</option>
            </select>
        </div>

        <div class="campo">
            <label>Valor da Venda</label>
            <input type="number" id="valor">
        </div>

        <div class="campo">
            <label>Quantidade de Parcelas</label>
            <input type="number" id="parcelas">
        </div>

        <button id="calcular">Calcular</button>

        <div id="resultado"></div>

    </div>

    <script>

        const botao = document.getElementById("calcular");

        botao.addEventListener("click", () => {

            let bandeira = document.getElementById("bandeira").value;

            let valor = Number(document.getElementById("valor").value);

            let parcelas = Number(document.getElementById("parcelas").value);

            let taxaBandeira = 0;

            switch (bandeira) {

                case "visa":
                    taxaBandeira = valor * 0.02;
                    break;

                case "master":
                    taxaBandeira = valor * 0.0185;
                    break;

                case "elo":
                    taxaBandeira = valor * 0.03;
                    break;
            }

            // Juros simples
            let juros = valor * (0.015 * parcelas);

            // Taxa mensal fixa
            let taxaMensal = 12.50 * parcelas;

            // Valor total
            let valorTotal = valor + taxaBandeira + juros + taxaMensal;

            // Valor por parcela
            let valorParcela = valorTotal / parcelas;

            const resultado = document.getElementById("resultado");

            resultado.innerHTML = `
                <strong>Resumo da Venda</strong><br><br>

                Taxa da Bandeira: R$ ${taxaBandeira.toFixed(2)} <br>

                Juros Totais: R$ ${juros.toFixed(2)} <br>

                Taxa Mensal: R$ ${taxaMensal.toFixed(2)} <br>

                Valor Total: R$ ${valorTotal.toFixed(2)} <br>

                Valor de Cada Parcela: R$ ${valorParcela.toFixed(2)}
            `;

        });

    </script>

</body>
</html>
