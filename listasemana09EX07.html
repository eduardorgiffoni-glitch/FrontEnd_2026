<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Segurança Infinity</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #painel {
            margin-top: 25px;
            padding: 18px;
            border-radius: 8px;
            background-color: #f8f8f8;
            line-height: 1.8;
        }

        .valido {
            color: green;
            font-weight: bold;
        }

        .invalido {
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="card">

        <h1>Infinity Card Guard</h1>

        <div class="campo">

            <label>Número do Cartão</label>

            <input
                type="text"
                id="cartao"
                maxlength="19"
                placeholder="Digite o número do cartão"
            >

        </div>

        <button id="analisar">
            Analisar Cartão
        </button>

        <div id="painel"></div>

    </div>

    <script>

        const botao = document.getElementById("analisar");

        botao.addEventListener("click", () => {

            let numero =
                document.getElementById("cartao").value;

            // Remove espaços e pontos
            numero = numero.replace(/\s/g, "")
                           .replace(/\./g, "");

            const painel =
                document.getElementById("painel");

            // Verifica tamanho
            if (numero.length < 13 || numero.length > 16) {

                painel.innerHTML = `
                    <span class="invalido">
                        Número inválido!
                    </span>
                `;

                return;
            }

            // ---------------------------
            // ALGORITMO DE LUHN
            // ---------------------------

            let soma = 0;

            let invertido =
                numero.split("").reverse();

            for (let i = 0; i < invertido.length; i++) {

                let digito =
                    Number(invertido[i]);

                if (i % 2 !== 0) {

                    digito *= 2;

                    if (digito > 9) {

                        digito -= 9;
                    }
                }

                soma += digito;
            }

            let valido = (soma % 10 === 0);

            // ---------------------------
            // IDENTIFICA BANDEIRA
            // ---------------------------

            let bandeira = "Desconhecida";

            if (numero.startsWith("4")) {

                bandeira = "Visa";

            } else if (
                numero.startsWith("51") ||
                numero.startsWith("52") ||
                numero.startsWith("53") ||
                numero.startsWith("54") ||
                numero.startsWith("55")
            ) {

                bandeira = "MasterCard";

            } else if (
                numero.startsWith("34") ||
                numero.startsWith("37")
            ) {

                bandeira = "American Express";

            } else if (numero.startsWith("6")) {

                bandeira = "Discover / Elo";

            }

            // ---------------------------
            // SETOR PELO PRIMEIRO DÍGITO
            // ---------------------------

            let setor = "";

            switch (numero[0]) {

                case "1":
                    setor = "Companhias Aéreas";
                    break;

                case "2":
                    setor = "Financeiro / Bancário";
                    break;

                case "3":
                    setor = "Viagens e Entretenimento";
                    break;

                case "4":
                case "5":
                    setor = "Instituições Financeiras";
                    break;

                case "6":
                    setor = "Comércio e Bancos";
                    break;

                default:
                    setor = "Setor Não Identificado";
            }

            // ---------------------------
            // BANCO EMISSOR (simples)
            // ---------------------------

            let banco = "Banco Não Identificado";

            if (numero.startsWith("4")) {

                banco = "Infinity Visa Bank";

            } else if (
                numero.startsWith("51") ||
                numero.startsWith("52")
            ) {

                banco = "Infinity Master Bank";

            } else if (
                numero.startsWith("34") ||
                numero.startsWith("37")
            ) {

                banco = "Infinity Amex Services";

            } else if (numero.startsWith("6")) {

                banco = "Infinity Elo Finance";

            }

            // ---------------------------
            // EXIBE RESULTADO
            // ---------------------------

            painel.innerHTML = `

                <strong>Status:</strong>
                <span class="${
                    valido ? "valido" : "invalido"
                }">

                    ${
                        valido ? "Cartão Válido" :
                        "Cartão Inválido"
                    }

                </span>

                <br>

                <strong>Bandeira:</strong>
                ${bandeira}

                <br>

                <strong>Categoria de Setor:</strong>
                ${setor}

                <br>

                <strong>Banco Emissor:</strong>
                ${banco}

            `;

        });

    </script>

</body>
</html>
