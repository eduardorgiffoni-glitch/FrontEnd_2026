<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Conversor de Temperatura</h1>

        <div class="campo">
            <label for="celsius">Celsius (°C)</label>
            <input type="number" id="celsius" step="0.1">
        </div>

        <div class="campo">
            <label for="fahrenheit">Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" step="0.1">
        </div>
    </div>

    <script>

        const celsius = document.getElementById("celsius");
        const fahrenheit = document.getElementById("fahrenheit");

        celsius.addEventListener("input", () => {

            let valorC = parseFloat(celsius.value);

            if (isNaN(valorC)) {
                fahrenheit.value = "";
                return;
            }

            let valorF = (valorC * 9/5) + 32;

            fahrenheit.value = valorF.toFixed(2);
        });

        fahrenheit.addEventListener("input", () => {

            let valorF = parseFloat(fahrenheit.value);

            if (isNaN(valorF)) {
                celsius.value = "";
                return;
            }

            let valorC = (valorF - 32) * 5/9;

            celsius.value = valorC.toFixed(2);
        });

    </script>

</body>
</html>
