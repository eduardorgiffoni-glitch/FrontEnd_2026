<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .aprovado {
            color: blue;
        }

        .exame {
            color: green;
        }

        .reprovado {
            color: red;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Média Escolar</h1>

        <div class="campo">
            <label>Nome do Aluno</label>
            <input type="text" id="nome">
        </div>

        <div class="campo">
            <label>Nota 1</label>
            <input type="number" id="nota1">
        </div>

        <div class="campo">
            <label>Nota 2</label>
            <input type="number" id="nota2">
        </div>

        <div class="campo">
            <label>Nota 3</label>
            <input type="number" id="nota3">
        </div>

        <button id="calcular">Calcular Média</button>

        <div id="resultado"></div>

    </div>

    <script>

        const botao = document.getElementById("calcular");

        botao.addEventListener("click", () => {

            let nome = document.getElementById("nome").value;

            let nota1 = Number(document.getElementById("nota1").value);
            let nota2 = Number(document.getElementById("nota2").value);
            let nota3 = Number(document.getElementById("nota3").value);

            let media = (nota1 + nota2 + nota3) / 3;

            const resultado = document.getElementById("resultado");

            if (media >= 7 && media <= 10) {

                resultado.innerHTML =
                    `${nome} foi APROVADO! <br> Média: ${media.toFixed(2)}`;

                resultado.className = "aprovado";

            } else if (media >= 4 && media < 7) {

                let falta = 10 - media;

                resultado.innerHTML =
                    `${nome} está em EXAME! <br>
                    Média: ${media.toFixed(2)} <br>
                    Faltam ${falta.toFixed(2)} pontos para chegar em 10.`;

                resultado.className = "exame";

            } else {

                resultado.innerHTML =
                    `${nome} foi REPROVADO! <br> Média: ${media.toFixed(2)}`;

                resultado.className = "reprovado";
            }

        });

    </script>

</body>
</html>
